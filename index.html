<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Philippe Carpentier — Peintures &amp; Thierry Farcy Sculptures. Vernissage le 30 avril 2026. Galerie des Croisiers, Caen."
    />
    <title>Philippe Carpentier — Galerie des Croisiers, Caen</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="nav" role="navigation" aria-label="Navigation principale">
      <a class="nav__logo" href="/">Philippe <span>Carpentier</span></a>
      <ul class="nav__links">
        <li><a href="/">Accueil</a></li>
        <li><a href="/exposition">L'exposition</a></li>
        <li><a href="/galerie">Oeuvres</a></li>
        <li><a href="/artiste">L'artiste</a></li>
      </ul>
    </nav>

    <main class="page">
      <section class="hero" aria-label="En-tête">
        <div class="hero__bg">
          <img
            class="hero__bg-img"
            src="assets/image1.jpg"
            alt="Oeuvre de Philippe Carpentier"
            onerror="this.style.display = 'none'"
          />
        </div>
        <div class="hero__content">
          <h1 class="hero__title">Philippe<br />Carpentier</h1>
          <p class="hero__subtitle">
            Peintures &amp; Sculptures — avec Thierry Farcy
          </p>
          <div class="hero__info">
            <span class="hero__info-item">Galerie des Croisiers, Caen</span>
            <span class="hero__info-sep"></span>
            <span class="hero__info-item">30 avril — 13 mai 2026</span>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__copy">
        &copy; 2026 Galerie des Croisiers, Caen. Tous droits réservés.
      </p>
      <nav class="footer__nav" aria-label="Navigation pied de page">
        <a href="/admin">Admin</a>
      </nav>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
